    <script type="text/javascript">
        $(document).ready(function(){
            $('#header .top-nav-mb .open-btn').click(function(){
                $('#header .nav-gnb').fadeIn(300);
            });
            $('#header .nav-gnb .close-btn').click(function(){
                $('#header .nav-gnb').fadeOut(300);
            });
            $('#header .top-nav-dt .open-btn').click(function(){
                $('#header .nav-gnb').fadeToggle(300);
                $('#header .top-nav-dt .open-btn').toggleClass('active');
            });
        });

        const setVh = () => {
            document.documentElement.style.setProperty('--vh', `${window.innerHeight}px`);
        };
        window.addEventListener('resize', setVh);
        setVh();
    </script>
