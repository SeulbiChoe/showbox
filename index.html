    <script src="js/swiper.js"></script>
    <script type="text/javascript">
        // 모바일에서 100vh 설정
        function setScreenSize() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }
        setScreenSize();


        $(document).ready(function(){
            $('body').addClass('nonScroll');
           
            //스크롤 하면 Mobile Nav 백그라운드 색상 변화
            $(window).scroll(function(){
                var scroll = $(window).scrollTop();
                if (scroll > 1) {
                    $('.mb-nav-top').addClass('scroll');
                }
                else if (scroll == 0) {
                    $('.mb-nav-top').removeClass('scroll');
                }
            });

        });
        $('.popup .popup_close-btn').click(function(){
            $('.popup').hide();
            $('body').removeClass('nonScroll');
            $('#wrap > div:first-child').removeClass('bg-bk')
        });

        $('.menu-btn').click(function(){
            $('.mb-open-menu').show();
            $('.mb-nav-top').css('position', 'relative');
        });
        $('.menu_close-btn').click(function(){
            $('.mb-open-menu').hide();
            $('.mb-nav-top').css('position', 'fixed');
        })
        function allMenu () {
            $('.mb-open-menu .btm .inner .menu > div').slideToggle();
        }
    </script>
